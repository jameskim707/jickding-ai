<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직딩AI 고충처리전담반</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Noto Serif KR',serif;
    background:#d4c5a0;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:2rem 1rem;
  }
  .page{
    width:100%;
    max-width:680px;
    background:#f0e8cc;
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(160,130,60,.07) 28px),
      repeating-linear-gradient(90deg,transparent,transparent 27px,rgba(160,130,60,.07) 28px);
    border:1px solid #c0a870;
    border-radius:4px;
    position:relative;
    overflow:hidden;
    box-shadow:0 4px 24px rgba(80,50,10,.18);
  }

  /* 배경 도장 */
  .wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-25deg);font-size:100px;font-weight:700;color:rgba(150,40,40,.04);pointer-events:none;white-space:nowrap;letter-spacing:12px;z-index:0;}
  .sd1{position:absolute;top:22px;right:26px;font-size:12px;color:rgba(140,40,40,.13);font-weight:700;border:3px solid rgba(140,40,40,.13);padding:5px 9px;border-radius:2px;transform:rotate(-14deg);letter-spacing:5px;z-index:0;}
  .sd2{position:absolute;bottom:90px;left:22px;font-size:12px;color:rgba(140,40,40,.11);font-weight:700;border:3px solid rgba(140,40,40,.11);padding:5px 9px;border-radius:2px;transform:rotate(7deg);letter-spacing:5px;z-index:0;}

  /* 헤더 */
  .hdr{
    background:#7a1515;
    padding:1.4rem 1.5rem 1.2rem;
    text-align:center;
    border-bottom:4px double #c0a870;
    position:relative;
    z-index:1;
  }
  .hdr-inner{display:flex;align-items:center;justify-content:center;gap:16px;}
  .seal{
    display:flex;align-items:center;justify-content:center;
    width:66px;height:66px;border-radius:50%;
    border:3px solid #f0e8cc;
    background:rgba(255,255,255,.08);
    position:relative;flex-shrink:0;
  }
  .seal::after{
    content:'';position:absolute;top:4px;left:4px;right:4px;bottom:4px;
    border-radius:50%;border:1px solid rgba(240,232,204,.35);
  }
  .seal-txt{font-size:18px;font-weight:700;color:#f0e8cc;letter-spacing:-1px;}
  .htitle{color:#f0e8cc;font-size:21px;font-weight:700;letter-spacing:2px;}
  .hsub{color:#e0c88a;font-size:12px;margin-top:5px;letter-spacing:1px;}

  /* API 키 입력 영역 */
  .api-section{
    background:rgba(122,21,21,.07);
    border-bottom:1px solid #c0a870;
    padding:.8rem 1.4rem;
    position:relative;z-index:1;
    display:flex;align-items:center;gap:8px;
  }
  .api-label{font-size:11px;color:#4a3010;font-weight:700;white-space:nowrap;letter-spacing:.5px;}
  .api-input{
    flex:1;padding:6px 10px;border:1px solid #c0a870;border-radius:2px;
    background:rgba(255,255,255,.7);font-family:'Noto Sans KR',sans-serif;
    font-size:12px;color:#2a1a08;
  }
  .api-input:focus{outline:none;border-color:#7a1515;}
  .api-save{
    font-family:'Noto Serif KR',serif;padding:6px 12px;background:#7a1515;
    border:none;color:#f0e8cc;font-size:11px;cursor:pointer;border-radius:2px;
    white-space:nowrap;
  }
  .api-save:hover{background:#9a2020;}
  .api-ok{font-size:11px;color:#1a6b2a;font-weight:700;display:none;}

  /* 본문 */
  .dbody{padding:1.2rem 1.4rem;position:relative;z-index:1;}

  .rrow{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #c0a870;padding-bottom:8px;margin-bottom:12px;}
  .rnum{font-size:12px;color:#4a3010;letter-spacing:1px;font-weight:700;}
  .rdate{font-size:11px;color:#7a5830;}

  .flabel{font-size:11px;color:#4a3010;font-weight:700;margin-bottom:5px;letter-spacing:1px;display:block;}

  .catrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  .cbtn{
    font-family:'Noto Serif KR',serif;font-size:11px;padding:5px 10px;
    border:1px solid #c0a870;background:#e8ddb0;color:#4a3010;
    cursor:pointer;border-radius:2px;transition:all .15s;letter-spacing:.5px;
  }
  .cbtn.on,.cbtn:hover{background:#7a1515;color:#f0e8cc;border-color:#7a1515;}

  .hr{border:none;border-top:1px solid #c0a870;margin:12px 0;}

  .sel-wrap{position:relative;margin-bottom:12px;}
  .psel{
    font-family:'Noto Serif KR',serif;width:100%;padding:9px 34px 9px 11px;
    background:rgba(255,255,255,.7);border:1px solid #c0a870;border-radius:2px;
    font-size:12px;color:#4a3010;cursor:pointer;appearance:none;-webkit-appearance:none;
  }
  .psel:focus{outline:none;border-color:#7a1515;}
  .sel-arr{position:absolute;right:11px;top:50%;transform:translateY(-50%);pointer-events:none;color:#7a5830;font-size:13px;}

  .gtxt{
    width:100%;min-height:110px;background:rgba(255,255,255,.65);
    border:1px solid #c0a870;border-radius:2px;padding:10px;
    font-family:'Noto Serif KR',serif;font-size:13px;color:#2a1a08;
    resize:vertical;line-height:1.75;
  }
  .gtxt:focus{outline:none;border-color:#7a1515;background:rgba(255,255,255,.85);}
  .cnt{font-size:11px;color:#7a5830;text-align:right;margin-top:4px;}

  .btnrow{display:flex;gap:10px;margin-top:14px;}
  .btn-app{
    font-family:'Noto Serif KR',serif;flex:1;padding:13px 10px;
    background:#1a6b2a;border:2px solid #0f4a1c;color:#f0e8cc;
    font-size:13px;cursor:pointer;border-radius:3px;font-weight:700;
    letter-spacing:.5px;transition:background .15s;
  }
  .btn-app:hover{background:#237035;}
  .btn-rej{
    font-family:'Noto Serif KR',serif;flex:1;padding:13px 10px;
    background:#8b1a1a;border:2px solid #6a1010;color:#f0e8cc;
    font-size:13px;cursor:pointer;border-radius:3px;font-weight:700;
    letter-spacing:.5px;transition:background .15s;
  }
  .btn-rej:hover{background:#a02020;}
  .slabel{display:block;font-size:10px;letter-spacing:2px;opacity:.75;margin-bottom:3px;}

  .loading{display:none;text-align:center;padding:16px;color:#7a5830;font-size:13px;}

  .errbox{
    display:none;background:#fff0f0;border:1px solid #cc8888;
    border-left:4px solid #cc2222;border-radius:2px;padding:11px;
    margin-top:12px;font-size:12px;color:#5a1a1a;line-height:1.6;
    font-family:'Noto Sans KR',sans-serif;
  }

  .rbox{
    display:none;background:rgba(255,255,255,.8);border:1px solid #c0a870;
    border-left:4px solid #7a1515;border-radius:2px;padding:14px;
    margin-top:14px;font-size:13px;color:#2a1a08;line-height:1.9;
    position:relative;
  }
  .rstamp{
    position:absolute;top:12px;right:14px;font-size:11px;font-weight:700;
    color:#1a6b2a;border:2px solid #1a6b2a;padding:4px 8px;border-radius:50%;
    transform:rotate(-12deg);letter-spacing:1px;opacity:0;
    transition:opacity .5s .3s;white-space:nowrap;
  }
  .rbox.show .rstamp{opacity:1;}

  footer{
    text-align:center;padding:.8rem;font-size:10px;color:#9a8050;
    border-top:1px solid #c0a870;position:relative;z-index:1;letter-spacing:1px;
  }

  @media(max-width:480px){
    .hdr-inner{flex-direction:column;gap:8px;}
    .btnrow{flex-direction:column;}
    .api-section{flex-wrap:wrap;}
  }
</style>
</head>
<body>
<div class="page">
  <div class="wm">엄수</div>
  <div class="sd1">嚴守</div>
  <div class="sd2">速達</div>

  <!-- 헤더 -->
  <div class="hdr">
    <div class="hdr-inner">
      <div class="seal"><span class="seal-txt">엄수</span></div>
      <div>
        <div class="htitle">직딩AI 고충처리전담반</div>
        <div class="hsub">당신의 고충, 저희가 처리해드립니다 😄</div>
      </div>
    </div>
  </div>

  <!-- API 키 입력 -->
  <div class="api-section">
    <span class="api-label">🔑 API KEY</span>
    <input type="password" class="api-input" id="apikey" placeholder="Anthropic API Key를 입력하세요 (sk-ant-...)">
    <button class="api-save" onclick="saveKey()">저장</button>
    <span class="api-ok" id="api-ok">✔ 저장됨</span>
  </div>

  <!-- 본문 -->
  <div class="dbody">
    <div class="rrow">
      <span class="rnum" id="rnum">접수번호: 第 2026-0001 호</span>
      <span class="rdate" id="rdate"></span>
    </div>

    <label class="flabel">■ 고충 유형 선택</label>
    <div class="catrow">
      <button class="cbtn on" onclick="selCat(this)">상사 갈등</button>
      <button class="cbtn" onclick="selCat(this)">연봉 협상</button>
      <button class="cbtn" onclick="selCat(this)">퇴사 고민</button>
      <button class="cbtn" onclick="selCat(this)">직장 내 괴롭힘</button>
      <button class="cbtn" onclick="selCat(this)">인간관계</button>
      <button class="cbtn" onclick="selCat(this)">기타 고충</button>
    </div>

    <hr class="hr">

    <label class="flabel">■ 처리 방식 선택 (Processing Method)</label>
    <div class="sel-wrap">
      <select class="psel" id="method">
        <option value="상담">AI 고충 상담 (기본 처리)</option>
        <option value="suno">🎵 Suno용 노래 가사 생성</option>
        <option value="shorts">📱 숏폼 영상 스크립트 제작</option>
        <option value="blog">📝 블로그/인스타 업로드 원고</option>
      </select>
      <span class="sel-arr">▼</span>
    </div>

    <label class="flabel">■ 상세 고충 내용을 기재하시오</label>
    <textarea class="gtxt" id="ginput" placeholder="오늘도 부장님 때문에 사표를 썼다 지웠다... 이 빡침을 어떻게 해결해야 하나요?" oninput="updCnt()"></textarea>
    <div class="cnt"><span id="cnt">0</span>자 입력됨</div>

    <div class="btnrow">
      <button class="btn-app" onclick="doSubmit()">
        <span class="slabel">APPROVED</span>
        이 고충, 즉시 처리 ↗
      </button>
      <button class="btn-rej" onclick="clearAll()">
        <span class="slabel">REJECTED</span>
        회사로 돌아가기 (노예 복귀)
      </button>
    </div>

    <div class="loading" id="loading">⏳ 고충 검토 중입니다. 잠시만 기다려 주십시오...</div>
    <div class="errbox" id="errbox"></div>
    <div class="rbox" id="rbox">
      <div class="rstamp">처리완료</div>
      <div id="rcontent"></div>
    </div>
  </div>

  <footer>직딩AI 고충처리전담반 · Lyra Project © 2026 · SORI Studio</footer>
</div>

<script>
let cat = '상사 갈등', rcnt = 1;

(function init(){
  const n = new Date();
  document.getElementById('rdate').textContent =
    n.getFullYear()+'년 '+(n.getMonth()+1)+'월 '+n.getDate()+'일';
  const saved = localStorage.getItem('jikding_apikey');
  if(saved){
    document.getElementById('apikey').value = saved;
    document.getElementById('api-ok').style.display = 'inline';
  }
})();

function saveKey(){
  const k = document.getElementById('apikey').value.trim();
  if(!k){alert('API Key를 입력해주세요.');return;}
  localStorage.setItem('jikding_apikey', k);
  document.getElementById('api-ok').style.display = 'inline';
}

function selCat(el){
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  cat = el.textContent;
}

function updCnt(){
  document.getElementById('cnt').textContent = document.getElementById('ginput').value.length;
}

function clearAll(){
  document.getElementById('ginput').value='';
  document.getElementById('cnt').textContent='0';
  document.getElementById('rbox').style.display='none';
  document.getElementById('rbox').classList.remove('show');
  document.getElementById('loading').style.display='none';
  document.getElementById('errbox').style.display='none';
}

function showErr(msg){
  const eb = document.getElementById('errbox');
  eb.style.display='block';
  eb.innerHTML='⚠ 오류: '+msg;
  document.getElementById('loading').style.display='none';
}

function getSys(m){
  const k = '모든 답변은 반드시 한국어로 작성하시오.';
  if(m==='suno') return '당신은 직딩AI 고충처리전담반 작사 AI입니다. 직장인의 고충을 Suno AI용 노래 가사로 만드세요.\n형식:\n【Suno 노래 가사 처리 결과】\n▶ 장르 추천:\n▶ 곡 제목:\n▶ 가사:\n[Verse 1] (4줄)\n[Chorus] (4줄)\n[Verse 2] (4줄)\n[Outro] (2줄)\n▶ Suno 프롬프트 태그 (영문 5개):\n'+k;
  if(m==='shorts') return '당신은 직딩AI 숏폼 스크립트 AI입니다. 직장인 고충을 60초 숏폼 영상 스크립트로 만드세요.\n형식:\n【숏폼 영상 스크립트 처리 결과】\n▶ 영상 제목:\n▶ 훅 (0-3초):\n▶ 본문 (3-50초):\n▶ 마무리 (50-60초):\n▶ 해시태그 (5개):\n'+k;
  if(m==='blog') return '당신은 직딩AI 콘텐츠 AI입니다. 직장인 고충을 블로그/인스타 원고로 만드세요.\n형식:\n【블로그/인스타 원고 처리 결과】\n▶ 제목:\n▶ 도입부:\n▶ 본문 (소제목 3개):\n▶ 마무리:\n▶ 인스타 캡션 버전:\n'+k;
  return '당신은 직딩AI 고충처리전담반 AI 상담관입니다. 공문서 특유의 딱딱함과 직딩 공감을 절묘하게 섞어 처리하세요.\n형식:\n【처리 결과 보고서】\n▶ 고충 유형:\n▶ 핵심 진단:\n▶ 처리 방안 (3가지):\n▶ 전담반 한마디:\n'+k;
}

async function doSubmit(){
  const apiKey = document.getElementById('apikey').value.trim();
  if(!apiKey){alert('상단에 API Key를 먼저 입력하고 저장해주세요.');return;}

  const text = document.getElementById('ginput').value.trim();
  if(!text){alert('고충 내용을 입력하십시오.');return;}

  const method = document.getElementById('method').value;

  document.getElementById('loading').style.display='block';
  document.getElementById('rbox').style.display='none';
  document.getElementById('rbox').classList.remove('show');
  document.getElementById('errbox').style.display='none';

  rcnt++;
  document.getElementById('rnum').textContent='접수번호: 第 2026-'+String(rcnt).padStart(4,'0')+' 호';

  let resp, data;
  try{
    resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1200,
        system: getSys(method),
        messages:[{role:'user',content:'고충 유형: '+cat+'\n고충 내용: '+text}]
      })
    });
  }catch(e){
    showErr('네트워크 오류 — '+e.message);
    return;
  }

  try{data = await resp.json();}
  catch(e){showErr('응답 파싱 오류 (HTTP '+resp.status+')');return;}

  if(!resp.ok){
    showErr((data.error?.message||JSON.stringify(data))+' (HTTP '+resp.status+')');
    return;
  }

  const ans = data?.content?.[0]?.text;
  if(!ans){showErr('응답 내용 없음: '+JSON.stringify(data));return;}

  document.getElementById('loading').style.display='none';
  const rb = document.getElementById('rbox');
  rb.style.display='block';
  document.getElementById('rcontent').innerHTML = ans.replace(/\n/g,'<br>');
  setTimeout(()=>rb.classList.add('show'),50);
}
</script>
</body>
</html>
